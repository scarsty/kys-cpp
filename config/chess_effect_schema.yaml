效果系统版本: 2
说明:
- 此文件是效果类型注册表草案，用来校验某个效果类型是否能绑定到某个挂钩。
- 它表达可泛化的部分：挂钩调度、条件判断、目标选择、次数/持续时间、共享执行器；具体数值变更仍由效果处理器负责。
- 当前内容从 config/chess_combos.yaml 推断，后续 runtime 应该把它变成 BattleEffectRegistry 的数据来源或测试基准。
挂钩:
- 名称: 战斗初始化
  阶段: setup
  是否战斗内: true
- 名称: 每帧
  阶段: frame
  是否战斗内: true
- 名称: 技能结束后
  阶段: action
  是否战斗内: true
- 名称: 绝招释放
  阶段: action
  是否战斗内: true
- 名称: 攻击命中
  阶段: damage
  是否战斗内: true
- 名称: 被攻击命中
  阶段: damage
  是否战斗内: true
- 名称: 伤害计算前_攻击方
  阶段: damage
  是否战斗内: true
- 名称: 伤害计算前_防御方
  阶段: damage
  是否战斗内: true
- 名称: 受伤后
  阶段: damage
