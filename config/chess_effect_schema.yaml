  阶段: death
  是否战斗内: true
- 名称: 击杀
  阶段: death
  是否战斗内: true
- 名称: 自身死亡
  阶段: death
  是否战斗内: true
- 名称: 同羁绊成员死亡
  阶段: death
  是否战斗内: true
- 名称: 受治疗后
  阶段: heal
  是否战斗内: true
- 名称: 战前选场
  阶段: pre_battle
  是否战斗内: false
- 名称: 羁绊解析
  阶段: combo_resolution
  是否战斗内: false
- 名称: 商店阶段
  阶段: shop
  是否战斗内: false
- 名称: 经济结算
  阶段: economy
  是否战斗内: false
- 名称: 战斗胜利结算
  阶段: progression
  是否战斗内: false
条件类型:
- 名称: 概率
  参数:
  - 数值
  - 单位
- 名称: 自身生命低于
  参数:
  - 数值
  - 单位
- 名称: 最后存活
  参数: []
- 名称: 套用到同羁绊成员
  参数:
  - 排除自身
- 名称: 次数上限
  参数:
  - 数值
- 名称: 持续时间
  参数:
  - 数值
  - 单位
目标选择器:
- 自身
- 攻击者
- 命中目标
- 命中目标周围
- 同羁绊成员
- 我方全体
- 敌方全体
- 敌方范围
- 敌方优先目标
- 附近敌人
- 依效果定义
共享执行器:
- 名称: 属性修正
  说明: 修改目标的基础属性或百分比属性；生命、攻击、防御、速度和全队版本都应共用。
  参数:
  - 数值
  - 附加参数
- 名称: 成长属性修正
  说明: 胜利或局外成长用的属性修正，不进入战斗 hook dispatcher。
  参数:
  - 数值
  - 附加参数
- 名称: 战斗内属性修正
  说明: 战斗过程中临时或永久修改角色属性，例如击杀增攻、同袍之死、敌方攻防削弱。
  参数:
  - 数值
  - 附加参数
  - 持续帧数
- 名称: 伤害修正
  说明: 在伤害流水线中加减固定伤害或乘百分比伤害。
  参数:
  - 数值
  - 附加参数
- 名称: 伤害上限
  说明: 按当前或最大生命限制单次承伤上限。
  参数:
  - 数值
- 名称: 治疗
  说明: 对目标回复生命；命中回血、击杀回血、生命回复、治疗光环、群体施治、死亡医疗共用。
  参数:
  - 数值
  - 附加参数
- 名称: 修改内力
  说明: 增加、消耗、吸取或给团队回复 MP。
  参数:
  - 数值
- 名称: 内力回复修正
  说明: 修改自然或战斗内回蓝倍率。
  参数:
  - 数值
- 名称: 添加护盾
  说明: 按固定值或最大生命百分比给目标添加护盾。
  参数:
  - 数值
  - 附加参数
- 名称: 护盾破裂效果
  说明: 护盾破裂时触发伤害、自动绝招、临时 buff 或资源回复。
  参数:
  - 数值
  - 附加参数
  - 持续帧数
- 名称: 添加状态
  说明: 给目标添加限时状态，例如眩晕、封内、中毒、流血、伤害降低、临时攻击加成。
  参数:
  - 数值
  - 附加参数
  - 持续帧数
- 名称: 添加无敌帧
  说明: 把目标 Invincible 提升或设置为指定帧数；受伤无敌、技能后无敌、击杀无敌应共用这个执行器。
  参数:
  - 数值
- 名称: 死亡保护并添加无敌帧
  说明: 在将死时保留 1 点生命并添加无敌帧；它复用无敌帧写入，但多了死亡拦截语义。
  参数:
  - 数值
- 名称: 定时添加无敌帧
  说明: 按间隔触发无敌帧，适用于周期免伤。
  参数:
  - 数值
  - 附加参数
- 名称: 修改冷却
  说明: 缩短或延长目标 CoolDown；冷却缩减、冷却延长反击、攻击冷却延长、受治疗加速共用。
  参数:
  - 数值
  - 附加参数
- 名称: 触发绝招
  说明: 在条件满足时请求角色释放绝招；自动绝招、周期绝招、格挡绝招反击共用。
  参数:
  - 数值
  - 附加参数
- 名称: 生成投射物
  说明: 生成额外投射物或投射物模式；连锁弹、绝招追加弹、螺旋流血弹、范围追踪弹共用。
  参数:
  - 数值
  - 附加参数
- 名称: 范围伤害
  说明: 对一组目标造成额外伤害，例如当前生命伤害和殉爆。
  参数:
  - 数值
  - 附加参数
  - 持续帧数
- 名称: 命中判定修正
  说明: 命中后改变本次攻击判定结果，例如穿甲或斩杀。
  参数:
  - 数值
  - 附加参数
- 名称: 命中位移
  说明: 命中后对目标施加击退或位移。
  参数:
  - 数值
  - 附加参数
- 名称: 战斗判定参数
  说明: 修改暴击、格挡、闪避等战斗判定参数。
  参数:
  - 数值
  - 附加参数
- 名称: 计数判定
  说明: 基于次数计数触发效果，例如每 N 次双倍和初次格挡。
  参数:
  - 数值
  - 附加参数
- 名称: 堆叠修正
  说明: 按目标或连击状态积累堆叠并参与伤害/防御/闪避计算。
  参数:
  - 数值
  - 附加参数
- 名称: 战斗参数修正
  说明: 设置战斗参数或能力开关，例如弹反、滑步攻击、远程化、僵直抗性。
  参数:
  - 数值
  - 附加参数
- 名称: 强制位移
  说明: 执行保护、处决或技能后的强制移动。
  参数:
  - 数值
  - 附加参数
- 名称: 专用执行器
  说明: 临时承接语义不确定或上下文不足的战斗效果；仍由 hook dispatcher 调度，但执行逻辑按效果类型硬编码。
  参数:
  - 数值
  - 附加参数
  - 持续帧数
  - 次数
- 名称: 经济修正
  说明: 经济系统处理，不进入战斗 hook dispatcher。
  参数:
  - 数值
- 名称: 商店修正
  说明: 商店系统处理，不进入战斗 hook dispatcher。
  参数:
  - 数值
- 名称: 战前规则修正
  说明: 战前规则处理，不进入战斗 hook dispatcher。
  参数:
  - 数值
- 名称: 羁绊解析修正
  说明: 羁绊解析阶段处理，不进入战斗 hook dispatcher。
  参数:
  - 名称
