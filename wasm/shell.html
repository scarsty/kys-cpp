<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>KYS-CPP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            touch-action: none;
        }
        /* Wrapper takes the overflow:hidden so that position:fixed children
           (the overlay) are NOT clipped — a known Safari bug when overflow:hidden
           is set directly on <html> or <body>. */
        #wrap {
            position: fixed;
            top: 0; right: 0; bottom: 0; left: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border: none;
            outline: none;
            background: #000;
        }
        #overlay {
            position: fixed; top: 0; right: 0; bottom: 0; left: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: #000;
            color: #ccc;
            font-family: system-ui, sans-serif;
            z-index: 10;
            transition: opacity 0.4s;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }
        #title { font-size: 1.5rem; margin-bottom: 1.5rem; }
        #spinner {
            width: 36px; height: 36px;
            border: 3px solid #333;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status { margin-top: 0.75rem; font-size: 0.85rem; color: #888; }
        #rclick-btn, #fs-btn {
            position: fixed;
            width: 3.5rem; height: 3.5rem;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 1.2rem;
            z-index: 5;
            display: none;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        #rclick-btn { bottom: 2rem; right: 2rem; }
        #fs-btn { bottom: 2rem; left: 2rem; }
        #rclick-btn:active, #fs-btn:active { background: rgba(255,255,255,0.3); }
        @media (pointer: coarse) { #rclick-btn, #fs-btn { display: flex; } }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="title">金群自走棋</div>
        <div id="spinner"></div>
        <div id="status">Loading...</div>
    </div>
    <div id="wrap">
        <canvas id="canvas" width="1280" height="720" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        <button id="rclick-btn" aria-label="Right click">✕</button>
        <button id="fs-btn" aria-label="Fullscreen">⛶</button>
    </div>
    <script>
        var statusEl = document.getElementById('status');
        var overlay = document.getElementById('overlay');

        // Diagnostic: check prerequisites for pthreads
        (function() {
            var msgs = [];
            if (typeof SharedArrayBuffer === 'undefined')
                msgs.push('SharedArrayBuffer is NOT available');
            if (!window.crossOriginIsolated)
                msgs.push('Page is NOT cross-origin isolated');
            if (typeof Worker === 'undefined')
                msgs.push('Web Workers are NOT available');
            if (msgs.length) {
                statusEl.innerText = 'ERROR: ' + msgs.join('; ');
                statusEl.style.color = '#f44';
                console.error('[kys-diag]', msgs.join('; '));
            } else {
                console.log('[kys-diag] SharedArrayBuffer OK, crossOriginIsolated OK');
            }
        })();

        // Gate overlay dismissal on two conditions:
        // 1. WASM runtime initialized, 2. C++ fonts loaded (fired from TitleScene::draw)
        var runtimeReady = false;
        var cppFontsReady = false;

        function tryHideOverlay() {
            if (runtimeReady && cppFontsReady) {
                overlay.classList.add('hidden');
                setTimeout(function() { overlay.style.display = 'none'; }, 500);
            }
        }

        // Test OPFS before wasm loads — resolves as microtask before any pthread proxy message
        var opfsReady = false;
        if (navigator.storage && navigator.storage.getDirectory) {
            navigator.storage.getDirectory()
                .then(function() { opfsReady = true; console.log('[kys] OPFS available'); })
                .catch(function(e) { console.warn('[kys] OPFS unavailable:', e.message); });
        }

        var Module = {
            canvas: document.getElementById('canvas'),
            _onCppFontsLoaded: function() {
                console.log('[kys] C++ fonts loaded');
                cppFontsReady = true;
                tryHideOverlay();
            },
            onAbort: function(what) {
                var msg = 'WASM aborted: ' + what;
                statusEl.innerText = msg;
                statusEl.style.color = '#f44';
                console.error('[kys-diag]', msg);
            },
            printErr: function() {
                var text = Array.prototype.slice.call(arguments).join(' ');
                console.error('[kys-stderr]', text);
            },
            setStatus: function(text) {
                if (text) statusEl.innerText = text;
            },
            onRuntimeInitialized: function() {
                console.log('[kys] runtime initialized');
                runtimeReady = true;
                if (!cppFontsReady) statusEl.innerText = 'Loading game fonts...';
                tryHideOverlay();
            }
        };

        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('click', function() { Module.canvas.focus(); });
        document.addEventListener('touchstart', function() { Module.canvas.focus(); });

        // Right-click button for touch devices
        var rclickBtn = document.getElementById('rclick-btn');
        rclickBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (Module.ccall) {
                Module.ccall('inject_right_click', null, [], []);
            }
        });

        var lastTouchX = null, lastTouchY = null;
        document.getElementById('canvas').addEventListener('touchstart', function(e) {
            var rect = e.target.getBoundingClientRect();
            lastTouchX = e.touches[0].clientX - rect.left;
            lastTouchY = e.touches[0].clientY - rect.top;
        });
        document.getElementById('canvas').addEventListener('touchmove', function(e) {
            var rect = e.target.getBoundingClientRect();
            lastTouchX = e.touches[0].clientX - rect.left;
            lastTouchY = e.touches[0].clientY - rect.top;
        });

        // Fullscreen button for touch devices
        var fsBtn = document.getElementById('fs-btn');
        var originalCanvasW = 1280, originalCanvasH = 720;

        var _syncTimer = 0;
        var _generation = 0;
        var _inFullscreen = false;

        // iOS standalone PWA (Add to Home Screen) counts as "fullscreen"
        function isEffectiveFullscreen() {
            if (document.fullscreenElement || document.webkitFullscreenElement) return true;
            if (navigator.standalone) return true; // iOS PWA
            if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return true;
            return false;
        }

        function applyCanvasSize() {
            if (!runtimeReady) return;
            var canvas = Module.canvas;
            var fs = isEffectiveFullscreen();

            if (fs) {
                var dpr = window.devicePixelRatio || 1;
                var vv = window.visualViewport;
                var cssW = vv ? vv.width : window.innerWidth;
                var cssH = vv ? vv.height : window.innerHeight;
                canvas.style.maxWidth = 'none';
                canvas.style.maxHeight = 'none';
                Module.ccall('resize_to_viewport', null,
                    ['number', 'number', 'number', 'number'],
                    [cssW * dpr, cssH * dpr, cssW, cssH]);
            } else if (_inFullscreen) {
                // Only reset when actually exiting fullscreen
                canvas.style.width = '';
                canvas.style.height = '';
                canvas.style.maxWidth = '';
                canvas.style.maxHeight = '';
                Module.ccall('resize_to_viewport', null,
                    ['number', 'number', 'number', 'number'],
                    [originalCanvasW, originalCanvasH, originalCanvasW, originalCanvasH]);
                canvas.style.width = '';
                canvas.style.height = '';
            }
            _inFullscreen = fs;
        }

        function syncCanvasSize() {
            var gen = ++_generation;
            applyCanvasSize();
            clearTimeout(_syncTimer);
            _syncTimer = setTimeout(function() {
                if (_generation === gen) applyCanvasSize();
            }, 200);
        }

        // Only listen for fullscreen changes
        document.addEventListener('fullscreenchange', syncCanvasSize);
        document.addEventListener('webkitfullscreenchange', syncCanvasSize);

        fsBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                var doc = document.documentElement;
                var req = doc.requestFullscreen || doc.webkitRequestFullscreen;
                if (!req) return;
                req.call(doc).then(function() {
                    if (screen.orientation && screen.orientation.lock) {
                        return screen.orientation.lock('landscape').catch(function() {});
                    }
                }).catch(function() {});
            } else {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
                var exit = document.exitFullscreen || document.webkitExitFullscreen;
                if (exit) exit.call(document);
            }
        });

        Module.setStatus('Loading...');
    </script>
    {{{ SCRIPT }}}
</body>
</html>
