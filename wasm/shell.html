<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>KYS-CPP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            touch-action: none;
        }
        /* Wrapper takes the overflow:hidden so that position:fixed children
           (the overlay) are NOT clipped — a known Safari bug when overflow:hidden
           is set directly on <html> or <body>. */
        #wrap {
            position: fixed;
            top: 0; right: 0; bottom: 0; left: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border: none;
            outline: none;
            background: #000;
        }
        #overlay {
            position: fixed; top: 0; right: 0; bottom: 0; left: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: #000;
            color: #ccc;
            font-family: system-ui, sans-serif;
            z-index: 10;
            transition: opacity 0.4s;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }
        #title { font-size: 1.5rem; margin-bottom: 1.5rem; }
        #spinner {
            width: 36px; height: 36px;
            border: 3px solid #333;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status { margin-top: 0.75rem; font-size: 0.85rem; color: #888; }
        #rclick-btn, #fs-btn {
            position: fixed;
            width: 3.5rem; height: 3.5rem;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 1.2rem;
            z-index: 5;
            display: none;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        #rclick-btn { bottom: 2rem; right: 2rem; }
        #fs-btn { bottom: 2rem; left: 2rem; display: flex; }
        #rclick-btn:active, #fs-btn:active { background: rgba(255,255,255,0.3); }
        @media (pointer: coarse) { #rclick-btn, #fs-btn { display: flex !important; } }
        /* #mobile-indicator {
            position: fixed;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.25rem 0.5rem;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 0.7rem;
            border-radius: 4px;
            z-index: 20;
        } */
    </style>
</head>
<body>
    <div id="mobile-indicator"></div>
    <div id="overlay">
        <div id="title">金群自走棋</div>
        <div id="spinner"></div>
        <div id="status">Loading...</div>
    </div>
    <div id="wrap">
        <canvas id="canvas" width="1280" height="720" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        <button id="rclick-btn" aria-label="Right click">✕</button>
        <button id="fs-btn" aria-label="Expand viewport">⛶</button>
    </div>
    <script>
        var statusEl = document.getElementById('status');
        var overlay = document.getElementById('overlay');
        var prerequisiteFailed = false;

        // Gate overlay dismissal on two conditions:
        // 1. WASM runtime initialized, 2. C++ fonts loaded (fired from TitleScene::draw)
        var runtimeReady = false;
        var cppFontsReady = false;

        function tryHideOverlay() {
            if (prerequisiteFailed) return; // keep error visible
            if (runtimeReady && cppFontsReady) {
                overlay.classList.add('hidden');
                setTimeout(function() { overlay.style.display = 'none'; }, 500);
            }
        }

        // Detect if running on mobile device
        var isMobileDevice = (function() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                   (navigator.maxTouchPoints && navigator.maxTouchPoints > 1);
        })();

        // Show mobile detection status
        // document.getElementById('mobile-indicator').textContent =
        //     isMobileDevice ? '📱 Mobile Mode' : '🖥️ Desktop Mode';

        var Module = {
            canvas: document.getElementById('canvas'),
            _isMobileDevice: function() {
                return isMobileDevice ? 1 : 0;
            },
            _onCppFontsLoaded: function() {
                console.log('[kys] C++ fonts loaded');
                cppFontsReady = true;
                tryHideOverlay();
            },
            onAbort: function(what) {
                var msg = 'WASM aborted: ' + what;
                var spinner = document.getElementById('spinner');
                if (spinner) spinner.style.display = 'none';
                overlay.classList.remove('hidden');
                overlay.style.display = '';
                statusEl.innerHTML =
                    '<span style="color:#f44;font-weight:bold">⚠ 运行时错误</span><br><br>' +
                    '<span style="color:#f44">' + msg + '</span>';
                statusEl.style.color = '';
                console.error('[kys-diag]', msg);
            },
            printErr: function() {
                var text = Array.prototype.slice.call(arguments).join(' ');
                console.error('[kys-stderr]', text);
            },
            setStatus: function(text) {
                if (prerequisiteFailed) return; // don't overwrite error
                if (text) statusEl.innerText = text;
            },
            onRuntimeInitialized: function() {
                console.log('[kys] runtime initialized');
                runtimeReady = true;
                if (!isMobileDevice) {
                    _viewportExpanded = true;
                }
                syncCanvasSize();
                if (!cppFontsReady && !prerequisiteFailed) statusEl.innerText = 'Loading game fonts...';
                tryHideOverlay();
            },
            preRun: [function() {
                if (typeof KYS_MANIFEST === 'undefined') {
                    console.error('[kys] kys_manifest.js not loaded');
                    return;
                }
                var m = KYS_MANIFEST;
                // Create directory tree
                for (var i = 0; i < m.dirs.length; i++) {
                    try { FS.mkdir(m.dirs[i]); } catch(e) {}
                }
                // Create empty file entries tagged for lazy loading
                var files = 0;
                for (var i = 0; i < m.files.length; i++) {
                    var path = m.files[i];
                    var parts = path.split('/');
                    var name = parts.pop();
                    var parent = parts.join('/') || '/';
                    try {
                        FS.createDataFile(parent, name, new Uint8Array(0), true, false);
                        FS.lookupPath(path).node._lazyUrl = 'kys' + path;
                        files++;
                    } catch(e) {
                        console.error('[kys] register ' + path, e);
                    }
                }
                // Monkey-patch FS.open: first open() of a lazy file fetches
                // its content via fetch + Asyncify, pausing wasm until done.
                var origOpen = FS.open;
                FS.open = function(path, flags, mode) {
                    try {
                        var node = FS.lookupPath(path, {follow:true}).node;
                        if (node && node._lazyUrl) {
                            if (!node._loaded) {
                                var url = node._lazyUrl;
                                Asyncify.handleAsync(function() {
                                    return fetch(url).then(function(r) {
                                        if (!r.ok) throw new Error('HTTP ' + r.status + ' for ' + url);
                                        return r.arrayBuffer();
                                    }).then(function(ab) {
                                        node.contents = new Uint8Array(ab);
                                        node.usedBytes = ab.byteLength;
                                        node._loaded = true;
                                    });
                                });
                            } else if (typeof Asyncify !== 'undefined' && Asyncify.state === 2) {
                                Asyncify.handleAsync(function() { return Promise.resolve(); });
                            }
                        }
                    } catch(e) { /* lookupPath throws for non-lazy paths */ }
                    return origOpen.call(this, path, flags, mode);
                };
                // Mount IDBFS for persistent save data
                try { FS.mkdir('/persist'); } catch(e) {}
                FS.mount(IDBFS, {}, '/persist');
                // Sync IndexedDB → MEMFS before main() runs
                addRunDependency('idbfs-sync');
                FS.syncfs(true, function(err) {
                    if (err) console.error('[kys] IDBFS sync error:', err);
                    removeRunDependency('idbfs-sync');
                });
                console.log('[kys] manifest: ' + m.dirs.length + ' dirs, ' + files + ' deferred files');
            }]
        };

        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('click', function() { Module.canvas.focus(); });
        document.addEventListener('touchstart', function() { Module.canvas.focus(); });

        // Right-click button for touch devices
        var rclickBtn = document.getElementById('rclick-btn');
        rclickBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (Module.ccall) {
                Module.ccall('inject_right_click', null, [], []);
            }
        });

        var lastTouchX = null, lastTouchY = null;
        document.getElementById('canvas').addEventListener('touchstart', function(e) {
            var rect = e.target.getBoundingClientRect();
            lastTouchX = e.touches[0].clientX - rect.left;
            lastTouchY = e.touches[0].clientY - rect.top;
        });
        document.getElementById('canvas').addEventListener('touchmove', function(e) {
            var rect = e.target.getBoundingClientRect();
            lastTouchX = e.touches[0].clientX - rect.left;
            lastTouchY = e.touches[0].clientY - rect.top;
        });

        // Desktop: viewport expand button. Mobile: explicit browser fullscreen.
        var fsBtn = document.getElementById('fs-btn');
        var wrapEl = document.getElementById('wrap');
        var originalCanvasW = 1280, originalCanvasH = 720;


        var _syncTimer = 0;
        var _generation = 0;
        var _viewportExpanded = !isMobileDevice;

        function isEffectiveFullscreen() {
            if (document.fullscreenElement || document.webkitFullscreenElement) return true;
            if (navigator.standalone) return true;
            if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return true;
            return false;
        }

        function computeContainedCanvasSize() {
            var bounds = wrapEl.getBoundingClientRect();
            var maxCssW = bounds.width || window.innerWidth || originalCanvasW;
            var maxCssH = bounds.height || window.innerHeight || originalCanvasH;
            var scale = Math.min(maxCssW / originalCanvasW, maxCssH / originalCanvasH, 1);
            return {
                width: Math.max(1, Math.round(originalCanvasW * scale)),
                height: Math.max(1, Math.round(originalCanvasH * scale)),
                scale: scale
            };
        }

        function applyCanvasSize() {
            if (!runtimeReady) return;
            var canvas = Module.canvas;
            var expanded = _viewportExpanded || isEffectiveFullscreen();

            if (expanded) {
                var dpr = window.devicePixelRatio || 1;
                var vv = window.visualViewport;
                var cssW = vv ? vv.width : window.innerWidth;
                var cssH = vv ? vv.height : window.innerHeight;
                canvas.style.maxWidth = 'none';
                canvas.style.maxHeight = 'none';
                canvas.style.width = cssW + 'px';
                canvas.style.height = cssH + 'px';
                Module.ccall('resize_to_viewport', null,
                    ['number', 'number', 'number', 'number'],
                    [cssW * dpr, cssH * dpr, cssW, cssH]);
                fsBtn.textContent = '🗗';
            } else {
                var dpr = window.devicePixelRatio || 1;
                var fitted = computeContainedCanvasSize();
                canvas.style.maxWidth = 'none';
                canvas.style.maxHeight = 'none';
                canvas.style.width = fitted.width + 'px';
                canvas.style.height = fitted.height + 'px';
                Module.ccall('resize_to_viewport', null,
                    ['number', 'number', 'number', 'number'],
                    [Math.round(fitted.width * dpr), Math.round(fitted.height * dpr), fitted.width, fitted.height]);
                fsBtn.textContent = '⛶';
            }
        }

        function syncCanvasSize() {
            var gen = ++_generation;
            applyCanvasSize();
            for (var i = 1; i <= 3; i++) {
                setTimeout(function(g) {
                    return function() {
                        if (_generation === g) applyCanvasSize();
                    };
                }(gen), i * 200);
            }
        }

        function onViewportChange() {
            syncCanvasSize();
            if (isMobileDevice) {
                rclickBtn.style.display = 'flex';
                fsBtn.style.display = 'flex';
            }
        }
        window.addEventListener('resize', onViewportChange);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', onViewportChange);
        }

        function toggleMobileFullscreen(e) {
            e.preventDefault();
            e.stopPropagation();
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                var doc = document.documentElement;
                var req = doc.requestFullscreen || doc.webkitRequestFullscreen;
                if (!req) return;
                req.call(doc).then(function() {
                    if (screen.orientation && screen.orientation.lock) {
                        return screen.orientation.lock('landscape').catch(function() {});
                    }
                }).catch(function() {});
            } else {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
                var exit = document.exitFullscreen || document.webkitExitFullscreen;
                if (exit) exit.call(document);
            }
        }

        function toggleViewportExpand(e) {
            e.preventDefault();
            e.stopPropagation();
            _viewportExpanded = !_viewportExpanded;
            syncCanvasSize();
        }
        fsBtn.addEventListener('touchstart', function(e) {
            if (isMobileDevice) {
                toggleMobileFullscreen(e);
            } else {
                toggleViewportExpand(e);
            }
        });
        fsBtn.addEventListener('click', function(e) {
            if (!isMobileDevice) {
                toggleViewportExpand(e);
            }
        });

        if (!prerequisiteFailed) Module.setStatus('Loading...');

        // Mute audio when page goes to background
        document.addEventListener('visibilitychange', function() {
            if (Module.SDL3 && Module.SDL3.audioContext) {
                if (document.hidden) {
                    Module.SDL3.audioContext.suspend();
                } else {
                    Module.SDL3.audioContext.resume();
                }
            }
            // Restore buttons when page becomes visible again
            if (!document.hidden && isMobileDevice) {
                rclickBtn.style.display = 'flex';
                fsBtn.style.display = 'flex';
            }
        });
    </script>
    <script src="kys_manifest.js"></script>
    {{{ SCRIPT }}}
</body>
</html>
